<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6b35"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="96" stroke="url(#ring)" stroke-width="10" fill="none" filter="url(#glow)"/>
  <circle cx="128" cy="128" r="72" stroke="#ff6b35" stroke-opacity="0.35" stroke-width="6" fill="none"/>
  <g stroke="#ff6b35" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <circle cx="128" cy="128" r="58"/>
    <line x1="128" y1="70" x2="128" y2="186"/>
    <line x1="70" y1="128" x2="186" y2="128"/>
  </g>
  <g fill="#ff6b35" fill-opacity="0.38">
    <circle cx="98" cy="98" r="12"/>
    <circle cx="158" cy="98" r="12"/>
    <circle cx="98" cy="158" r="12"/>
    <circle cx="158" cy="158" r="12"/>
  </g>
</svg>
