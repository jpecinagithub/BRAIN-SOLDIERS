<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="96" stroke="url(#ring)" stroke-width="10" fill="none" filter="url(#glow)"/>
  <circle cx="128" cy="128" r="72" stroke="#00d4ff" stroke-opacity="0.35" stroke-width="6" fill="none"/>
  <g stroke="#00d4ff" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <circle cx="128" cy="128" r="44"/>
    <circle cx="128" cy="128" r="20"/>
    <line x1="128" y1="66" x2="128" y2="88"/>
    <line x1="128" y1="168" x2="128" y2="190"/>
    <line x1="66" y1="128" x2="88" y2="128"/>
    <line x1="168" y1="128" x2="190" y2="128"/>
  </g>
  <circle cx="128" cy="128" r="6" fill="#00d4ff"/>
</svg>
