<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff4757"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="96" stroke="url(#ring)" stroke-width="10" fill="none" filter="url(#glow)"/>
  <circle cx="128" cy="128" r="72" stroke="#ff4757" stroke-opacity="0.35" stroke-width="6" fill="none"/>
  <g stroke="#ff4757" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <rect x="78" y="70" width="100" height="116" rx="14"/>
    <line x1="98" y1="106" x2="158" y2="106"/>
    <line x1="98" y1="140" x2="158" y2="140"/>
    <line x1="118" y1="90" x2="138" y2="90"/>
    <line x1="128" y1="80" x2="128" y2="100"/>
  </g>
  <g fill="#ff4757" fill-opacity="0.35">
    <circle cx="106" cy="122" r="6"/>
    <circle cx="150" cy="122" r="6"/>
    <circle cx="106" cy="156" r="6"/>
    <circle cx="150" cy="156" r="6"/>
  </g>
</svg>
