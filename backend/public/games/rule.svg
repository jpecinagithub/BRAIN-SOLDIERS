<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#48dbfb"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="96" stroke="url(#ring)" stroke-width="10" fill="none" filter="url(#glow)"/>
  <circle cx="128" cy="128" r="72" stroke="#48dbfb" stroke-opacity="0.35" stroke-width="6" fill="none"/>
  <g stroke="#48dbfb" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <rect x="78" y="72" width="100" height="112" rx="14"/>
    <polyline points="96,112 106,122 124,102"/>
    <line x1="134" y1="112" x2="162" y2="112"/>
    <polyline points="96,152 106,162 124,142"/>
    <line x1="134" y1="152" x2="162" y2="152"/>
  </g>
</svg>
